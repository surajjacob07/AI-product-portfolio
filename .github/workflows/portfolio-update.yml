name: Bi-Weekly Portfolio Update

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTFOLIO_TOKEN }}

      - name: Set git identity
        run: |
          git config user.name "Suraj Jacob Bot"
          git config user.email "suraj.jacob07@gmail.com"

      - name: Update timestamp
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          echo "Last updated: $DATE" > LAST_UPDATED.txt

      - name: Commit and push
        run: |
          git add .
          git diff --cached --quiet || git commit -m "chore: portfolio update $(date '+%Y-%m-%d')"
          git push
