name: Bi-Weekly Portfolio Update

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9am UTC
    - cron: '0 9 * * 4'   # Every Thursday 9am UTC
  workflow_dispatch:       # This creates the manual Run button

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PORTFOLIO_TOKEN }}

      - name: Update timestamp
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          echo "Last updated: $DATE" > LAST_UPDATED.txt
          git config user.name "Suraj Jacob Bot"
          git config user.email "suraj.jacob07@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: portfolio update $DATE"
          git push
```

**Step 4 — Commit the file**
- Scroll down → click **"Commit new file"** (commit directly to main)

**Step 5 — Check Actions tab**
- Click the **Actions** tab in your repo
- Wait 30 seconds and refresh
- You should now see **"Bi-Weekly Portfolio Update"** on the left sidebar
- Click it → **"Run workflow"** → **"Run workflow"**

